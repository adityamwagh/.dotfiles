enabled = true

[notice.model_migrations]
"gpt-5.1-codex-mini" = "gpt-5.4"

[tui]
theme = "ansi"
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "context-window-size",
  "used-tokens",
  "total-input-tokens",
  "total-output-tokens",
]

[tui.model_availability_nux]
"gpt-5.5" = 4
