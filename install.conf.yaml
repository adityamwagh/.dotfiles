- defaults:
    link:
      create: true
      relink: true
      force: true
    shell:
      stdin: true
      stdout: true
      stderr: true

- clean: # Remove stale dotfile symlinks.
    ~/: # Clean top-level dotfile links.
      recursive: false # Do not scan home recursively.
      force: false # Only clean links into this repo.
    ~/.claude: # Clean Claude Code config links.
      recursive: false
      force: false
    ~/.config: # Clean direct config links.
      recursive: false # Avoid scanning app internals.
      force: false # Preserve non-dotfile broken links.
    ~/.config/ghostty: # Clean per-file app links from older layouts.
      recursive: false
      force: false
    ~/.config/nvim:
      recursive: false
      force: false
    ~/.config/wezterm:
      recursive: false
      force: false
    ~/.config/zed:
      recursive: false
      force: false
    ~/.local/bin: # Clean script and font installer links.
      recursive: false
      force: false
    ~/.local/share/konsole: # Clean Konsole colorscheme links (Linux).
      recursive: false
      force: false
    ~/Library/Application Support/konsole: # Clean Konsole colorscheme links (macOS).
      recursive: false
      force: false

- link:
    # Shell
    ~/.bash_profile: shells/bash/.bash_profile
    ~/.bashrc: shells/bash/.bashrc
    ~/.profile: shells/.profile
    ~/.zprofile: shells/zsh/.zprofile
    ~/.zshenv: shells/zsh/.zshenv
    ~/.zshrc: shells/zsh/.zshrc

    # Git
    ~/.gitconfig: .gitconfig

    # Packages
    ~/.Brewfile: Brewfile

    # Prompt
    ~/.config/starship.toml: starship/starship.toml

    # Neovim
    ~/.config/nvim/.stylua.toml: editors/nvim/.stylua.toml
    ~/.config/nvim/init.lua: editors/nvim/init.lua
    ~/.config/nvim/lua: editors/nvim/lua
    ~/.config/nvim/colors: editors/nvim/colors

    # Zed
    ~/.config/zed/settings.json: editors/zed/settings.json
    ~/.config/zed/tasks.json: editors/zed/tasks.json
    ~/.config/zed/themes: editors/zed/themes
    ~/.config/zed/keymap.json: editors/zed/keymap.json

    # Ghostty
    ~/.config/ghostty/config.ghostty: terminals/ghostty/config.ghostty
    ~/.config/ghostty/themes: terminals/ghostty/themes

    # WezTerm
    ~/.wezterm.lua: terminals/wezterm/.wezterm.lua
    ~/.config/wezterm/colors: terminals/wezterm/colors

    # Konsole colorschemes
    ~/.local/share/konsole/:
      glob: true
      path: terminals/konsole/colorschemes/*.colorscheme
      if: "[ $(uname) = Linux ]"
    ~/Library/Application Support/konsole/:
      glob: true
      path: terminals/konsole/colorschemes/*.colorscheme
      if: "[ $(uname) = Darwin ]"

    # zsh-patina
    ~/.config/zsh-patina: shells/zsh/patina

    # Coding Agents
    ~/.config/cship.toml: cship/cship.toml
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/keybindings.json: claude/keybindings.json
    ~/.claude/themes: claude/themes

# Ghostty per-OS local config: separate link blocks because the same
# target key twice in one block would collide in YAML.
- link:
    ~/.config/ghostty/config-local:
      path: terminals/ghostty/config-local-linux
      if: "[ $(uname) = Linux ]"

- link:
    ~/.config/ghostty/config-local:
      path: terminals/ghostty/config-local-macos
      if: "[ $(uname) = Darwin ]"

# Install system-integrated packages with the native package manager
# (dotbot-unipkg plugin). Idempotent: sudo only runs when something is
# missing. Tools that touch system directories or hardware belong here
# on Linux; everything else comes from the Brewfile.
- unipkg:
    - install:
        - ddcutil:
            filter: linux
        - eza:
            filter: linux
        - zsh:
            filter: linux
        - zstd: # ollama's installer needs it for extraction
            filter: linux

# Install Homebrew if missing, then apply the Brewfile (dotbot-brew plugin).
- brewfile:
    - Brewfile

- shell:
    - [
        "[ -f ~/.gitconfig.local ] || printf '# Machine-local Git overrides (identity, employer setup); loaded last by ~/.gitconfig.\\n' > ~/.gitconfig.local",
        "Seed ~/.gitconfig.local",
      ]
    - ["~/.dotfiles/scripts/install-custom-iosevka-extended.sh", "Install custom Iosevka Extended"]
    - ["~/.dotfiles/scripts/install-helvetica-now.sh", "Install HelveticaNow"]
    - ["~/.dotfiles/scripts/install-segoe-ui.sh", "Install Segoe UI (Linux)"]
    - ["~/.dotfiles/scripts/install-sf-pro.sh", "Install SF Pro (Linux)"]
    - ["~/.dotfiles/scripts/install-source-code-pro.sh", "Install Source Code Pro (Linux)"]
    - ["~/.dotfiles/scripts/set-default-shell.sh", "Set default shell to zsh"]
    - ["~/.dotfiles/scripts/install-cship.sh", "Install cship statusline"]
    - ["~/.dotfiles/scripts/install-zsh-patina.sh", "Install zsh-patina"]
    - ["~/.dotfiles/scripts/install-claude-code.sh", "Install Claude Code"]
    - ["~/.dotfiles/scripts/install-codex.sh", "Install Codex"]
    - ["~/.dotfiles/scripts/install-llama.sh", "Install llama.cpp"]
    - ["~/.dotfiles/scripts/install-ollama.sh", "Install Ollama"]
    - ["~/.dotfiles/scripts/install-opencode.sh", "Install opencode"]
    - ["~/.dotfiles/scripts/install-rustup.sh", "Install Rust toolchain"]
